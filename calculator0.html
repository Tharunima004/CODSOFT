<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Calculator</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #a3dede; }
        .calculator { background: rgb(224, 195, 229); padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        #display { width: 90%; height: 60px; font-size: 1.8em; text-align: right; margin-bottom: 10px; background: white; border: none; padding: 10px; border-radius: 5px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { width: 70px; height: 70px; font-size: 1.5em; border: none; background: rgb(232, 233, 230); color: black; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #8ea2dc; }
        .operator { background: rgb(220, 235, 173); color: rgb(218, 93, 39); border: 1px solid white; }
        .operator:hover { background: #030303; }
        .calculator::after { content: "Calculator"; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-size: 70px; font-weight: bold; color: rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button onclick="clearDisplay()">C</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="calculateResult()">=</button>
            <button class="operator" onclick="appendValue('/')">/</button>
        </div>
    </div>
    <script>
        let display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculateResult() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
            }
        }
    </script>
</body>
</html>
